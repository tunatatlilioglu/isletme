  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0f1117; --surface: #1a1d2e; --border: #2a2d3e;
    --text: #f1f5f9; --text2: #94a3b8; --accent: #f59e0b;
    --green: #10b981; --red: #f43f5e;
  }
  body {
    background: var(--bg); color: var(--text);
    font-family: system-ui, sans-serif;
    min-height: 100dvh; display: flex;
    flex-direction: column; align-items: center;
    justify-content: center; padding: 24px;
    text-align: center;
  }
  .emoji { font-size: 52px; margin-bottom: 12px; }
  .prod-name { font-size: 20px; font-weight: 800; margin-bottom: 6px; }
  .prod-price { font-size: 15px; color: var(--accent); margin-bottom: 32px; }
  .status { font-size: 14px; color: var(--text2); margin-bottom: 24px; }
  .users { display: flex; flex-direction: column; gap: 12px; width: 100%; max-width: 280px; }
  .user-btn {
    padding: 16px; border-radius: 14px;
    border: 2px solid var(--border); background: var(--surface);
    color: var(--text); font-size: 17px; font-weight: 700;
    cursor: pointer; transition: all .15s;
  }
  .user-btn:active { border-color: var(--accent); transform: scale(.97); }
  .success { color: var(--green); font-size: 18px; font-weight: 800; }
  .error-msg { color: var(--red); font-size: 15px; }
  .spinner {
    width: 36px; height: 36px; border: 3px solid var(--border);
    border-top-color: var(--accent); border-radius: 50%;
    animation: spin .7s linear infinite; margin: 0 auto 16px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>

const urunId = new URLSearchParams(location.search).get('urun');
const appEl = document.getElementById('app');
// Son seçilen kullanıcıyı hatırla
const savedUserId = sessionStorage.getItem('ekleUserId');
const savedUserName = sessionStorage.getItem('ekleUserName');

// Büyük/küçük harf duyarsız arama
const prod = PRODUCTS.find(p =>
  p.id.toUpperCase() === (urunId || '').toUpperCase() ||
  (p.qr && p.qr.toUpperCase() === (urunId || '').toUpperCase())
);

async function addToCart(userId) {
  const snap = await getDoc(doc(collection(db, 'sepetler'), userId));
  let cart = (snap.exists() && snap.data().cart) ? snap.data().cart : [];
  const existing = cart.find(i => i.id === prod.id && i.price === prod.price);
  if (existing) existing.qty += 1;
  else cart.push({ ...prod, qty: 1 });
  await setDoc(doc(collection(db, 'sepetler'), userId), { cart, guncelleme: Date.now() });
  return cart.reduce((s, i) => s + i.qty, 0); // toplam ürün sayısını döndür
}

window.secimiYap = async function(userId, userName) {
  sessionStorage.setItem('ekleUserId', userId);
  sessionStorage.setItem('ekleUserName', userName);
  appEl.innerHTML = `<div class="spinner"></div><div class="status">Ekleniyor...</div>`;
  try {
    const sepetUrunSayisi = await addToCart(userId);
    appEl.innerHTML = `
      <div class="emoji">✅</div>
      <div class="success">${prod.emoji} ${prod.name}<br>sepete eklendi</div>
      <div class="status" style="margin-top:8px">${userName} · Sepette toplam: ${sepetUrunSayisi} ürün</div>
      <div style="display:flex;flex-direction:column;gap:12px;margin-top:28px;width:100%;max-width:280px">
        <a href="https://tunatatlilioglu.github.io/isletme/satis_demo.html"
          style="padding:16px;border-radius:14px;border:none;background:#10b981;color:#fff;font-size:16px;font-weight:800;cursor:pointer;text-decoration:none;text-align:center;display:block">
          🛒 Sepete Git (${sepetUrunSayisi} ürün)
        </a>
        <button onclick="sessionStorage.removeItem('ekleUserId');sessionStorage.removeItem('ekleUserName');window.location.reload()"
          style="padding:16px;border-radius:14px;border:2px solid var(--border);background:var(--surface);color:var(--text);font-size:16px;font-weight:800;cursor:pointer">
          👤 Satıcı Değiştir
        </button>
      </div>
      <div style="margin-top:16px;font-size:12px;color:#666">Başka ürün eklemek için telefon kamerasıyla yeni QR okutun</div>
    `;
  } catch(e) {
    appEl.innerHTML = `<div class="error-msg">❌ Hata: ${e.message}<br><small style="color:#666">${e.code || ''}</small></div>`;
  }
};

function init() {
  if (!urunId || !prod) {
    appEl.innerHTML = `<div class="error-msg">❌ Ürün bulunamadı: ${urunId || '?'}</div>`;
    return;
  }

  // Daha önce kullanıcı seçildiyse direkt ekle
  if (savedUserId && savedUserName) {
    secimiYap(savedUserId, savedUserName);
    return;
  }

  appEl.innerHTML = `
    <div class="emoji">${prod.emoji || '📦'}</div>
    <div class="prod-name">${prod.name}</div>
    <div class="prod-price">€${Number(prod.price).toFixed(2)}</div>
    <div class="status">Kim ekliyor?</div>
    <div class="users">
      ${USERS.map(u => `<button class="user-btn" onclick="secimiYap('${u.id}','${u.ad}')">👤 ${u.ad}</button>`).join('')}
    </div>
  `;
}
